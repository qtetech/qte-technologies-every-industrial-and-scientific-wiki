name: Mirror to Bitbucket

on:
  push:
    branches:
      - main

jobs:
  mirror_to_bitbucket:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Bitbucket
        env:
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
        run: |
          # Xóa bỏ remote cũ nếu có
          git remote remove bitbucket || true
          
          # Sử dụng URL thuần của kho Bitbucket (Không chèn Token vào URL)
          git remote add bitbucket https://bitbucket.org/qtetech-global/industrial-scientific-catalog.git
          
          # Xác thực bằng HTTP Header Bearer - Chuẩn áp dụng cho Bitbucket API Tokens
          git -c http.extraHeader="Authorization: Bearer $BITBUCKET_TOKEN" push bitbucket main --force --tags
