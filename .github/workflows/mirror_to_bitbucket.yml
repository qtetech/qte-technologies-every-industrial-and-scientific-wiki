name: Mirror to Bitbucket

on:
  push:
    branches:
      - main

jobs:
  mirror_to_bitbucket:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Bitbucket
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: https://x-token-auth:${{ secrets.BITBUCKET_TOKEN }}@bitbucket.org/qtetech-global/industrial-scientific-catalog.git
