name: Mirror to Bitbucket

on:
  push:
    branches:
      - main

jobs:
  mirror_to_bitbucket:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Bitbucket
        env:
          BITBUCKET_EMAIL: ${{ secrets.BITBUCKET_EMAIL }}
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
        run: |
          # Xóa bỏ remote cũ nếu có để làm sạch tiến trình
          git remote remove bitbucket || true
          
          # Cấu hình URL kho chứa dữ liệu của QTE trên Bitbucket
          git remote add bitbucket https://bitbucket.org/qtetech-global/industrial-scientific-catalog.git
          
          # Tự động mã hóa Email và Token sang chuỗi Base64 chuẩn hóa (không xuống dòng)
          AUTH_BASE64=$(echo -n "$BITBUCKET_EMAIL:$BITBUCKET_TOKEN" | base64 -w 0)
          
          # Thực hiện ép đồng bộ dữ liệu sang Bitbucket qua HTTP Basic Auth bảo mật
          git -c http.extraHeader="Authorization: Basic $AUTH_BASE64" push bitbucket main --force --tags
