name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Cấu hình Robot
          git config --global user.email "tuan-qte@qtetech.com"
          git config --global user.name "QTE-Robot"
          
          # 2. Lệnh đẩy "Bất chấp": Đẩy nội dung hiện tại (HEAD) vào nhánh chính (main) của HF
          # Chúng ta dùng HEAD:refs/heads/main để đảm bảo không bị lệch nhánh
          git push --force https://nguyenhuutuan-qte:${{ secrets.HF_TOKEN }}@huggingface.co/datasets/QTE-Technologies/industrial-technical-archive HEAD:refs/heads/main
