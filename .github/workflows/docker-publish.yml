name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Thêm biến môi trường để ép chạy Node.js 24 theo yêu cầu của GitHub
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        # Nâng cấp lên v4 để hỗ trợ Node.js mới nhất
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        # Nâng cấp lên v3
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        # Nâng cấp lên v5
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/industrial-archive:latest
